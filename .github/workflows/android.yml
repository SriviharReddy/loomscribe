name: Build Android APK

on:
  push:
    branches:
      - '**' # Matches every branch

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm install

      - name: Sync Capacitor Assets
        run: npx cap sync android

      - name: Grant Executable Permissions to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Compile Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeChat-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Rename APK for Release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk VibeChat.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: VibeChat.apk
          name: VibeChat ${{ github.ref_name }}
          body: |
            VibeChat Standalone Serverless Android App (Capacitor Native APK).
            
            ### Highlights:
            - 100% Serverless, runs entirely client-side in standard browser storage (IndexedDB).
            - Direct DeepSeek stream completions directly from the WebView.
            - Built-in prompt card libraries and md prompt importer.
            - Fluid collapsible settings drawer on mobile viewports.
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
