<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoomScribe — Sign In</title>
    <meta name="description" content="Sign in to LoomScribe, your DeepSeek creative workspace.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.25);
            --accent-light: #7dd3fc;
            --surface: #0b0f19;
            --surface-2: #111827;
            --surface-3: #1e293b;
            --border: rgba(56, 189, 248, 0.18);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #f43f5e;
            --radius: 18px;
        }

        html, body {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: var(--surface);
            color: var(--text);
            overflow: hidden;
        }

        /* ── Animated background ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 70%);
            animation: drift 18s ease-in-out infinite alternate;
        }

        .bg-layer::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.12) 0%, transparent 70%);
            animation: drift 22s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(5%, 8%) scale(1.08); }
        }

        /* Animated grid */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
        }

        /* ── Layout ── */
        .login-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px;
            gap: 32px;
        }

        /* ── Brand ── */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeUp 0.5s ease both;
        }

        .brand-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 24px var(--accent-glow));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
        }

        .brand p {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ── Card ── */
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow:
                0 0 0 1px rgba(56, 189, 248, 0.08),
                0 32px 80px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(56, 189, 248, 0.06);
            animation: fadeUp 0.5s 0.1s ease both;
            backdrop-filter: blur(8px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* ── Form ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            pointer-events: none;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .input-wrap:focus-within svg {
            color: var(--accent-light);
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: var(--surface-3);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
        }

        input::placeholder {
            color: #4e4c63;
        }

        /* eye toggle */
        .toggle-eye {
            position: absolute;
            right: 13px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s;
        }

        .toggle-eye:hover { color: var(--text); }

        /* ── Error ── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 6px;
            color: var(--danger);
            font-size: 0.83rem;
            background: rgba(244, 63, 94, 0.08);
            border: 1px solid rgba(244, 63, 94, 0.2);
            border-radius: 8px;
            padding: 9px 12px;
            margin-bottom: 16px;
            animation: shake 0.35s ease;
        }

        .error-msg.visible { display: flex; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-5px); }
            60%       { transform: translateX(5px); }
        }

        /* ── Submit button ── */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #0284c7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-login:hover:not(:disabled) {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.45);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ripple */
        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.12), transparent);
            transform: translateX(-100%);
            animation: shimmer 2.5s 0.8s infinite;
        }

        @keyframes shimmer {
            to { transform: translateX(200%); }
        }

        /* spinner inside button */
        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner  { display: block; }

        /* ── Footer note ── */
        .login-footer {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
            animation: fadeUp 0.5s 0.2s ease both;
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div class="login-wrapper">
    <div class="brand">
        <div class="brand-icon">🌌</div>
        <h1>LoomScribe</h1>
        <p>DeepSeek Creative Workspace</p>
    </div>

    <div class="login-card">
        <div class="card-title">Welcome back</div>
        <div class="card-subtitle">Enter your password to continue</div>

        <div class="error-msg" id="error-msg" role="alert">
            <!-- icon -->
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="error-text">Incorrect password. Please try again.</span>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="password-input">Password</label>
                <div class="input-wrap">
                    <!-- lock icon -->
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input
                        type="password"
                        id="password-input"
                        name="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                        autofocus
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn-login" id="login-btn">
                <span class="btn-text">Sign In</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>
</div>

<script>
    const form      = document.getElementById('login-form');
    const passInput = document.getElementById('password-input');
    const loginBtn  = document.getElementById('login-btn');
    const errorMsg  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');

    function showError(msg) {
        errorText.textContent = msg;
        errorMsg.classList.add('visible');
        // re-trigger shake animation
        errorMsg.style.animation = 'none';
        requestAnimationFrame(() => { errorMsg.style.animation = ''; });
    }

    function hideError() {
        errorMsg.classList.remove('visible');
    }

    passInput.addEventListener('input', hideError);

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const password = passInput.value;
        if (!password) {
            showError('Please enter your password.');
            passInput.focus();
            return;
        }

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            const data = await res.json();

            if (res.ok && data.token) {
                localStorage.setItem('ls_auth_token', data.token);
                window.location.href = '/';
            } else {
                showError(data.error || 'Incorrect password. Please try again.');
                passInput.value = '';
                passInput.focus();
            }
        } catch {
            showError('Unable to reach the server. Please try again.');
        } finally {
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
        }
    });
</script>
</body>
</html>
